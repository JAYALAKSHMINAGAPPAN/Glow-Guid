<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GlowGuide - Beauty Care</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #fff3f3;
}

/* COMMON LAYOUT */
.page {
    display: flex;
    height: 100vh;
}

.side-img {
    width: 25%;
}

.side-img img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* CONTENT AREA */
.content {
    width: 50%;
    background: white;
    padding: 30px;
    text-align: center;
    overflow-y: auto;
}

select, button, input, textarea {
    padding: 10px;
    margin: 10px;
    width: 80%;
}

button {
    background-color: #8b3a3a;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

#analyze {
    display: none;
}

#preview {
    width: 150px;
    border-radius: 10px;
    margin-top: 10px;
}

#appointmentForm {
    display: none;
    margin-top: 20px;
}
</style>
</head>

<body>

<!-- ===== PAGE 1 ===== -->
<div id="home" class="page">

    <div class="side-img">
        <img src="icon.png.png">
    </div>

    <div class="content">
        <h1>GlowGuide</h1>
        <p>Select your skin type to get skincare routine</p>

        <select id="skinType">
            <option value="">-- Select Skin Type --</option>
            <option value="dry">Dry Skin</option>
            <option value="oily">Oily Skin</option>
            <option value="combination">Combination Skin</option>
            <option value="sensitive">Sensitive Skin</option>
        </select>

        <button onclick="showRoutine()">Show Routine</button>

        <div id="routine"></div>

        <button onclick="goToAnalyze()">Analyze My Skin →</button>
    </div>

    <div class="side-img">
        <img src="icon.png.png">
    </div>

</div>

<!-- ===== PAGE 2 ===== -->
<div id="analyze" class="page">

    <div class="side-img">
        <img src="icon.png.png">
    </div>

    <div class="content">
        <h2>Upload Your Face Image</h2>

        <input type="file" accept="image/*" id="faceImage" onchange="previewImage()">
        <br>
        <img id="preview">

        <br>
        <button onclick="analyzeSkin()">Analyze Skin</button>

        <p id="result"></p>

        <div id="appointmentForm">
            <h3>Dermatologist Appointment</h3>
            <input type="text" placeholder="Your Name">
            <input type="number" placeholder="Age">
            <textarea placeholder="Skin Problem"></textarea>
            <input type="date">
            <button onclick="submitAppointment()">Submit Appointment</button>
        </div>

        <br>
        <a href="#" onclick="goToHome()">← Back to Home</a>
    </div>

    <div class="side-img">
        <img src="icon.png.png">
    </div>

</div>

<script>
function showRoutine() {
    let skin = document.getElementById("skinType").value;
    let routine = document.getElementById("routine");

    let routines = {
        dry: "Gentle cleanser, hydrating toner, thick moisturizer, sunscreen.",
        oily: "Foaming cleanser, oil-free moisturizer, clay mask weekly.",
        combination: "Mild cleanser, gel moisturizer, sunscreen daily.",
        sensitive: "Fragrance-free cleanser, soothing moisturizer."
    };

    routine.innerHTML = skin ? "<h3>Routine</h3><p>" + routines[skin] + "</p>" : "Please select skin type.";
}

function goToAnalyze() {
    document.getElementById("home").style.display = "none";
    document.getElementById("analyze").style.display = "flex";
}

function goToHome() {
    document.getElementById("analyze").style.display = "none";
    document.getElementById("home").style.display = "flex";
}

function previewImage() {
    let file = document.getElementById("faceImage").files[0];
    if (file) {
        document.getElementById("preview").src = URL.createObjectURL(file);
    }
}

function analyzeSkin() {
    let image = document.getElementById("faceImage").value;
    let result = document.getElementById("result");
    let form = document.getElementById("appointmentForm");

    if (image === "") {
        result.innerHTML = "Please upload your face image.";
        return;
    }

    let needDoctor = Math.random() > 0.5;

    if (needDoctor) {
        result.innerHTML = "⚠ Skin issue detected. Dermatologist visit recommended.";
        form.style.display = "block";
    } else {
        result.innerHTML = "✅ Skin looks healthy. No dermatologist needed.";
        form.style.display = "none";
    }
}

function submitAppointment() {
    alert("Appointment booked successfully!");
}
</script>

</body>
</html>
